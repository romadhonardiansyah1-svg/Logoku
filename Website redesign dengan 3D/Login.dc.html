<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0a0816; color: #f4f2fb; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  @keyframes orbdrift { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,-30px) scale(1.12); } }
  @keyframes orbdrift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-36px,28px) scale(1.08); } }
  @keyframes spin3d { 0%,100% { transform: rotateY(-15deg) rotateX(7deg); } 50% { transform: rotateY(15deg) rotateX(-3deg); } }
  ::placeholder { color: #7d77a0; }
  input { font-family: 'Plus Jakarta Sans', sans-serif; }
  input:focus { outline: none; border-color: rgba(167,139,250,0.6) !important; box-shadow: 0 0 0 4px rgba(167,139,250,0.12); }
</style>
</helmet>

<div style="position: relative; min-height: 100vh; width: 100%; display: flex;">
  <div style="position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none;">
    <div style="position: absolute; top: -160px; left: -120px; width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.55), transparent 65%); filter: blur(40px); animation: orbdrift 16s ease-in-out infinite;"></div>
    <div style="position: absolute; bottom: -180px; right: 20%; width: 540px; height: 540px; border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.45), transparent 65%); filter: blur(50px); animation: orbdrift2 19s ease-in-out infinite;"></div>
  </div>

  <!-- Left brand panel -->
  <div style="position: relative; z-index: 1; flex: 1; padding: 56px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid rgba(255,255,255,0.06);">
    <a href="Landing.dc.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
      <span style="display: grid; place-items: center; width: 38px; height: 38px; border-radius: 11px; background: linear-gradient(135deg,#a78bfa,#60a5fa); font-family: 'Space Grotesk',sans-serif; font-weight: 700; color: #0a0816; font-size: 17px;">LK</span>
      <span style="font-family: 'Space Grotesk',sans-serif; font-weight: 700; font-size: 20px; color: #fff;">Logo<span style="color: #a78bfa;">Ku</span></span>
    </a>

    <div style="display: grid; place-items: center; perspective: 1100px; padding: 30px 0;">
      <div style="transform-style: preserve-3d; animation: spin3d 9s ease-in-out infinite; width: 220px; height: 220px; border-radius: 32px; background: linear-gradient(150deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03)); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(20px); box-shadow: 0 40px 90px rgba(76,29,149,0.55); display: grid; place-items: center;">
        <div style="width: 110px; height: 110px; border-radius: 30px; background: linear-gradient(135deg,#a78bfa,#60a5fa); display: grid; place-items: center; font-family: 'Space Grotesk',sans-serif; font-weight: 700; font-size: 46px; color: #0a0816; box-shadow: 0 20px 50px rgba(124,58,237,0.6);">LK</div>
      </div>
    </div>

    <div>
      <h2 style="font-family: 'Space Grotesk',sans-serif; font-weight: 700; font-size: 30px; line-height: 1.2; color: #fff; margin: 0; max-width: 360px;">Panel internal LogoKu</h2>
      <p style="font-size: 15px; line-height: 1.6; color: #aaa4c8; margin: 14px 0 0; max-width: 380px;">Masuk untuk mengelola pesanan, memperbarui status progres desain, dan memantau pembayaran klien.</p>
    </div>
  </div>

  <!-- Right auth panel -->
  <div style="position: relative; z-index: 1; width: 520px; display: grid; place-items: center; padding: 40px;">
    <div style="width: 100%; max-width: 380px; padding: 40px; border-radius: 26px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(24px); box-shadow: 0 30px 80px rgba(0,0,0,0.4);">
      <!-- Tabs -->
      <div style="display: flex; gap: 6px; padding: 5px; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); margin-bottom: 28px;">
        <button onClick="{{ showLogin }}" style="{{ loginTabStyle }}">Masuk</button>
        <button onClick="{{ showRegister }}" style="{{ registerTabStyle }}">Daftar</button>
      </div>

      <h1 style="font-family: 'Space Grotesk',sans-serif; font-weight: 700; font-size: 26px; color: #fff; margin: 0;">{{ heading }}</h1>
      <p style="font-size: 14px; color: #aaa4c8; margin: 8px 0 26px;">{{ subheading }}</p>

      <form onSubmit="{{ onSubmit }}" style="display: flex; flex-direction: column; gap: 18px;">
        <sc-if value="{{ isRegister }}" hint-placeholder-val="">
          <div>
            <label style="display: block; font-size: 13.5px; font-weight: 600; color: #d4cff0; margin-bottom: 8px;">Nama Lengkap</label>
            <input type="text" placeholder="Nama Anda" style="width: 100%; padding: 13px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: #fff; font-size: 14.5px;">
          </div>
        </sc-if>
        <div>
          <label style="display: block; font-size: 13.5px; font-weight: 600; color: #d4cff0; margin-bottom: 8px;">Email</label>
          <input type="email" placeholder="nama@email.com" style="width: 100%; padding: 13px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: #fff; font-size: 14.5px;">
        </div>
        <div>
          <label style="display: block; font-size: 13.5px; font-weight: 600; color: #d4cff0; margin-bottom: 8px;">Kata Sandi</label>
          <input type="password" placeholder="••••••••" style="width: 100%; padding: 13px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: #fff; font-size: 14.5px;">
        </div>
        <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-top: -4px;">
            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #aaa4c8; cursor: pointer;">
              <input type="checkbox" style="accent-color: #a78bfa; width: 15px; height: 15px;"> Ingat saya
            </label>
            <a href="#" style="font-size: 13px; color: #cdb8ff; text-decoration: none; font-weight: 600;">Lupa sandi?</a>
          </div>
        </sc-if>
        <button type="submit" style="margin-top: 6px; padding: 15px; border-radius: 13px; border: none; cursor: pointer; font-family: 'Plus Jakarta Sans',sans-serif; font-weight: 700; font-size: 15px; color: #0a0816; background: linear-gradient(135deg,#a78bfa,#60a5fa); box-shadow: 0 14px 34px rgba(124,58,237,0.45);" style-hover="filter: brightness(1.08);">{{ submitText }}</button>
      </form>

      <p style="text-align: center; font-size: 13px; color: #8c87a8; margin: 28px 0 0;">{{ switchPrompt }} <button onClick="{{ toggleMode }}" style="background: none; border: none; cursor: pointer; color: #cdb8ff; font-weight: 700; font-size: 13px; font-family: 'Plus Jakarta Sans',sans-serif; padding: 0;">{{ switchAction }}</button></p>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100, &quot;height&quot;: 720}}">
class Component extends DCLogic {
  state = { mode: 'login' };

  renderVals() {
    const isLogin = this.state.mode === 'login';
    const tabBase = 'flex:1; padding:11px; border-radius:10px; border:none; cursor:pointer; font-family:\'Plus Jakarta Sans\',sans-serif; font-weight:700; font-size:14px; transition:all .2s;';
    const tabOn = ' color:#0a0816; background:linear-gradient(135deg,#a78bfa,#60a5fa); box-shadow:0 8px 22px rgba(124,58,237,0.4);';
    const tabOff = ' color:#c9c4e0; background:transparent;';
    return {
      isLogin,
      isRegister: !isLogin,
      heading: isLogin ? 'Selamat datang kembali' : 'Buat akun baru',
      subheading: isLogin ? 'Masuk ke panel pengelolaan LogoKu.' : 'Daftarkan email Anda untuk akses dashboard.',
      submitText: isLogin ? 'Masuk' : 'Daftar Sekarang',
      switchPrompt: isLogin ? 'Belum punya akun?' : 'Sudah punya akun?',
      switchAction: isLogin ? 'Daftar di sini' : 'Masuk di sini',
      loginTabStyle: tabBase + (isLogin ? tabOn : tabOff),
      registerTabStyle: tabBase + (!isLogin ? tabOn : tabOff),
      showLogin: () => this.setState({ mode: 'login' }),
      showRegister: () => this.setState({ mode: 'register' }),
      toggleMode: () => this.setState({ mode: isLogin ? 'register' : 'login' }),
      onSubmit: (e) => { e.preventDefault(); window.location.href = 'Dashboard.dc.html'; },
    };
  }
}
</script>
</body>
</html>
